<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RobotV — Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
 
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 
  :root {
    --bg:    #000a12;
    --cyan:  #00e5ff;
    --green: #00e676;
    --amber: #ffab00;
    --red:   #ff1744;
    --dim:   #1a3a44;
  }
 
  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2rem 1.5rem;
    overflow: hidden;
  }
 
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
 
  /* ── Header ─────────────────────────────────────── */
  header {
    width: 100%;
    text-align: center;
    z-index: 1;
  }
  h1 {
    font-family: 'VT323', monospace;
    font-size: 2.6rem;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 18px rgba(0,229,255,0.4);
  }
  .subtitle { font-size: 0.68rem; color: var(--dim); letter-spacing: 3px; margin-top: 2px; }
 
  /* ── Main ────────────────────────────────────────── */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    flex: 1;
    justify-content: center;
    width: 100%;
    max-width: 400px;
    z-index: 1;
  }
 
  /* ── Text input area ─────────────────────────────── */
  #msg-input {
    width: 100%;
    background: #001018;
    border: 1px solid var(--dim);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.05rem;
    padding: 1rem 1.1rem;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 120px;
    line-height: 1.6;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--cyan);
  }
  #msg-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,229,255,0.1);
  }
  #msg-input::placeholder { color: #1a3a44; }
 
  /* ── Send button ─────────────────────────────────── */
  #send-btn {
    width: 100%;
    padding: 1.1rem;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'VT323', monospace;
    font-size: 1.8rem;
    letter-spacing: 5px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  #send-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--cyan);
    opacity: 0;
    transition: opacity 0.15s;
  }
  #send-btn:active::after { opacity: 0.08; }
  #send-btn:not(:disabled):hover {
    background: rgba(0,229,255,0.07);
    box-shadow: 0 0 24px rgba(0,229,255,0.18);
  }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #send-btn.sent {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 18px rgba(0,230,118,0.2);
  }
 
  /* ── Status message ──────────────────────────────── */
  #status-msg {
    font-size: 0.78rem;
    letter-spacing: 1px;
    min-height: 1.2em;
    text-align: center;
    color: var(--dim);
    transition: color 0.3s;
  }
  #status-msg.active { color: var(--cyan); }
  #status-msg.sent   { color: var(--green); }
  #status-msg.error  { color: var(--red); }
 
  /* ── Robot status bar ────────────────────────────── */
  #robot-status {
    width: 100%;
    padding: 0.6rem 1rem;
    background: #001018;
    border: 1px solid #0a2530;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.75rem;
    color: #2a5060;
    transition: border-color 0.3s, color 0.3s;
  }
  #robot-status.thinking { border-color: var(--amber); color: var(--amber); }
  #robot-status.speaking { border-color: var(--cyan);  color: var(--cyan);  }
 
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #0a2530;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  #robot-status.thinking .status-dot {
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
    animation: dot-pulse 0.8s ease-in-out infinite;
  }
  #robot-status.speaking .status-dot {
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    animation: dot-pulse 0.5s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
 
  /* ── Footer ──────────────────────────────────────── */
  footer {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.67rem;
    color: #0e2a33;
    z-index: 1;
    padding-bottom: 0.3rem;
  }
  .led {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #0a2530;
    transition: all 0.4s;
  }
  .led.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .led.err { background: var(--red);   box-shadow: 0 0 5px var(--red); }
</style>
</head>
<body>
 
<header>
  <h1>ROBOTV</h1>
  <div class="subtitle">PANEL DE CONTROL</div>
</header>
 
<main>
  <textarea
    id="msg-input"
    placeholder="Escribe lo que quieres que diga el robot..."
    maxlength="400"
    rows="5"
  ></textarea>
 
  <button id="send-btn" onclick="sendMessage()">
    ▶ ENVIAR A LA TV
  </button>
 
  <div id="status-msg">Escribe y pulsa enviar</div>
 
  <div id="robot-status">
    <div class="status-dot"></div>
    <span id="robot-status-text">robot en espera...</span>
  </div>
</main>
 
<footer>
  <div class="led" id="led-fb"></div>
  <span id="fb-label">conectando a firebase...</span>
</footer>
 
<!-- Firebase -->
<script type="module">
import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js';
 
const cfg = {
  apiKey:            "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
  authDomain:        "robotv-ai.firebaseapp.com",
  databaseURL:       "https://robotv-ai-default-rtdb.firebaseio.com",
  projectId:         "robotv-ai",
  storageBucket:     "robotv-ai.firebasestorage.app",
  messagingSenderId: "1046745856716",
  appId:             "1:1046745856716:web:fbac41ae5c25640482a069"
};
 
const app = initializeApp(cfg);
const db  = getDatabase(app);
 
// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const led   = document.getElementById('led-fb');
  const label = document.getElementById('fb-label');
  if (snap.val()) {
    led.className   = 'led on';
    label.textContent = 'firebase conectado';
  } else {
    led.className   = 'led err';
    label.textContent = 'sin conexión';
  }
});
 
// Watch robot status
onValue(ref(db, 'robot/status'), snap => {
  const s   = snap.val() || 'idle';
  const bar = document.getElementById('robot-status');
  const txt = document.getElementById('robot-status-text');
  const msgs = {
    idle:     'robot en espera...',
    thinking: '🤔 robot pensando...',
    speaking: '🗣️ robot hablando...',
  };
  bar.className = s !== 'idle' ? s : '';
  txt.textContent = msgs[s] || 'robot en espera...';
});
 
// Expose send
window._sendMsg = async (text) => {
  await set(ref(db, 'robot/userMessage'), { text, timestamp: Date.now() });
};
</script>
 
<script>
function setStatus(msg, cls) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className   = cls;
}
 
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const btn   = document.getElementById('send-btn');
  const text  = input.value.trim();
 
  if (!text) {
    setStatus('⚠️ Escribe algo primero', 'error');
    input.focus();
    return;
  }
  if (!window._sendMsg) {
    setStatus('❌ Firebase no conectado aún', 'error');
    return;
  }
 
  btn.disabled = true;
  setStatus('📡 enviando...', 'active');
 
  try {
    await window._sendMsg(text);
    btn.classList.add('sent');
    setStatus('✅ ¡Enviado a la TV!', 'sent');
    input.value = '';
 
    setTimeout(() => {
      btn.disabled = false;
      btn.classList.remove('sent');
      setStatus('Escribe y pulsa enviar', '');
      input.focus();
    }, 2000);
 
  } catch(e) {
    btn.disabled = false;
    setStatus('❌ Error: ' + e.message, 'error');
  }
}
 
// Ctrl+Enter / Cmd+Enter to send
document.getElementById('msg-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
