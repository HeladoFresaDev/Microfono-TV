<!DOCTYPE html>
<html>

<body>

<h2>RoboTV mic</h2>
<p id="status">Esperando wake word...</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"

import {
getDatabase,
ref,
update
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"


const firebaseConfig = {

apiKey: "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
authDomain: "robotv-ai.firebaseapp.com",
databaseURL: "https://robotv-ai-default-rtdb.firebaseio.com",
projectId: "robotv-ai",
storageBucket: "robotv-ai.firebasestorage.app",
messagingSenderId: "1046745856716",
appId: "1:1046745856716:web:fbac41ae5c25640482a069"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const params = new URLSearchParams(location.search)
const session = params.get("session")

const status = document.getElementById("status")

let listeningCommand = false

function startListening(){

const recognition = new webkitSpeechRecognition()

recognition.lang="es-ES"
recognition.continuous=true

recognition.start()

recognition.onresult = (event)=>{

const text = event.results[event.results.length-1][0].transcript.toLowerCase()

console.log(text)

if(!listeningCommand){

if(text.includes("oye robot")){

status.innerText="Escuchando comando..."

listeningCommand=true

}

}else{

status.innerText="Enviando comando..."

update(
ref(db,"sessions/"+session),
{
speech:text
}
)

listeningCommand=false

status.innerText="Esperando wake word..."

}

}

recognition.onend=()=>{

startListening()

}

}

startListening()

</script>

</body>
</html>
