<!DOCTYPE html>
<html>

<body>

<h2>Micrófono RoboTV</h2>

<button id="talk">Hablar</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
authDomain: "robotv-ai.firebaseapp.com",
databaseURL: "https://robotv-ai-default-rtdb.firebaseio.com",
projectId: "robotv-ai",
storageBucket: "robotv-ai.firebasestorage.app",
messagingSenderId: "1046745856716",
appId: "1:1046745856716:web:fbac41ae5c25640482a069"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const params =
new URLSearchParams(location.search)

const session =
params.get("session")

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.lang="es-ES"

document.getElementById("talk").onclick = ()=>{

recognition.start()

}

recognition.onresult = async (event)=>{

const text =
event.results[0][0].transcript

document.getElementById("status").innerText = text

// preguntar a Gemini

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyB7YMUPXumgK7ShzWouCIBihUtGpr8FfFw",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

contents:[
{
parts:[
{ text:text }
]
}

]

})
})

const data = await response.json()

const reply =
data.candidates[0].content.parts[0].text

// enviar respuesta a la TV

update(
ref(db,"sessions/"+session),
{reply:reply}
)

}

</script>

</body>
</html>
