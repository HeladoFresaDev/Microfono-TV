<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboTV Controller</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; font-size: 1.2rem; }
        button { background: #00BF00; color: white; border: none; padding: 20px 40px; border-radius: 10px; font-weight: bold; width: 90%; }
    </style>
</head>
<body>
    <h2 id="session-title">Conectando...</h2>
    <input type="text" id="msg" placeholder="Escribe aquí...">
    <button onclick="enviar()">ENVIAR A TV</button>

    <script>
        const firebaseConfig = { /* TUS DATOS DE FIREBASE */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Obtener ID de sesión de la URL (?s=TV-XXXX)
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('s');

        if(sessionId) {
            document.getElementById('session-title').innerText = "Conectado a: " + sessionId;
        } else {
            document.getElementById('session-title').innerText = "Error: Sin Sesión";
        }

        function enviar() {
            const texto = document.getElementById('msg').value;
            if(texto && sessionId) {
                db.ref('sesiones/' + sessionId).set({
                    mensaje: texto,
                    timestamp: Date.now()
                });
                document.getElementById('msg').value = "";
            }
        }
    </script>
</body>
</html>
