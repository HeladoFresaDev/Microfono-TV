<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control RoboTV</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { width: 80%; padding: 15px; font-size: 18px; border-radius: 10px; border: none; margin-bottom: 20px; outline: none; }
        button { width: 85%; padding: 20px; font-size: 20px; font-weight: bold; background: #00ff00; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #00cc00; }
    </style>
</head>
<body>

    <h2>Escribe para la TV</h2>
    <input type="text" id="mensajeInput" placeholder="Escribe algo aquí...">
    <button id="btnEnviar">ENVIAR A LA TV</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
            authDomain: "robotv-ai.firebaseapp.com",
            databaseURL: "https://robotv-ai-default-rtdb.firebaseio.com",
            projectId: "robotv-ai",
            storageBucket: "robotv-ai.firebasestorage.app",
            messagingSenderId: "1046745856716",
            appId: "1:1046745856716:web:fbac41ae5c25640482a069"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const input = document.getElementById('mensajeInput');
        const btn = document.getElementById('btnEnviar');

        btn.onclick = () => {
            const texto = input.value;
            if(texto.trim() !== "") {
                // Enviamos el texto y un timestamp para que la TV detecte que es un mensaje nuevo
                db.ref('interaccion/').set({
                    mensaje: texto,
                    timestamp: Date.now()
                });
                input.value = ""; // Limpiar caja después de enviar
            }
        };
    </script>
</body>
</html>
