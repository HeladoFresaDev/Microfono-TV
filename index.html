<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micrófono RoboTV (OpenRouter)</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body style="background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px;">
    <h2>🤖 RoboTV Control</h2>
    <div id="status" style="color: #38bdf8; margin-bottom: 20px;">Listo para escucharte</div>
    
    <button id="btn-hablar" style="width: 150px; height: 150px; border-radius: 50%; border: none; background: #3b82f6; color: white; font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); cursor: pointer;">
        HABLAR
    </button>

    <script>
        // Configuración de Firebase (Tus datos actuales)
        const firebaseConfig = {
            apiKey: "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
            authDomain: "robotv-ai.firebaseapp.com",
            databaseURL: "https://robotv-ai-default-rtdb.firebaseio.com",
            projectId: "robotv-ai",
            storageBucket: "robotv-ai.firebasestorage.app",
            messagingSenderId: "1046745856716",
            appId: "1:1046745856716:web:fbac41ae5c25640482a069"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CONFIGURACIÓN OPENROUTER
        const OPENROUTER_API_KEY = "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";

        const btn = document.getElementById('btn-hablar');
        const status = document.getElementById('status');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        recognition.onresult = async (event) => {
            const textoUsuario = event.results[0][0].transcript;
            status.innerText = "IA procesando...";
            btn.style.background = "#1e40af";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer 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`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemma-3-27b-it:free", // Puedes cambiarlo por "meta-llama/llama-3-8b-instruct"
                        "messages": [
                            {"role": "system", "content": "Eres un robot de 8 bits simpático. Responde muy corto, máximo 10 palabras."},
                            {"role": "user", "content": textoUsuario}
                        ]
                    })
                });

                const data = await response.json();
                const respuestaIA = data.choices[0].message.content;

                // Enviar respuesta a Firebase
                db.ref('interaccion/').set({
                    mensaje: respuestaIA,
                    timestamp: Date.now()
                });

                status.innerText = "¡Enviado a la tele!";
                btn.style.background = "#3b82f6";

            } catch (err) {
                console.error(err);
                status.innerText = "Error en OpenRouter";
            }
        };

        btn.onclick = () => recognition.start();
    </script>
</body>
</html>
