<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micrófono RoboTV</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body style="background: #121212; color: white; text-align: center; font-family: sans-serif; padding-top: 50px;">
    <h1>🎙️ Micrófono RoboTV</h1>
    <button id="btn-hablar" style="padding: 20px 40px; font-size: 20px; border-radius: 50px; border: none; background: #00FF00; cursor: pointer;">
        Pulsar para Hablar
    </button>
    <p id="status" style="margin-top: 20px; color: #888;">Listo para escuchar...</p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8SDQKoqy99SHXNF4o3rlmif9TFLa_5co",
            authDomain: "robotv-ai.firebaseapp.com",
            databaseURL: "https://robotv-ai-default-rtdb.firebaseio.com",
            projectId: "robotv-ai",
            storageBucket: "robotv-ai.firebasestorage.app",
            messagingSenderId: "1046745856716",
            appId: "1:1046745856716:web:fbac41ae5c25640482a069"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const btn = document.getElementById('btn-hablar');
        const status = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            status.innerText = "Tu navegador no soporta reconocimiento de voz.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';

            recognition.onstart = () => {
                status.innerText = "Escuchando...";
                btn.style.background = "red";
            };

            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                status.innerText = "Enviando: " + texto;
                // Enviamos a Firebase
                db.ref('interaccion/').set({
                    mensaje: texto,
                    timestamp: Date.now()
                });
            };

            recognition.onend = () => {
                status.innerText = "Escucha terminada.";
                btn.style.background = "#00FF00";
            };

            btn.onclick = () => recognition.start();
        }
    </script>
</body>
</html>
